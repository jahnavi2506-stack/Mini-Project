{% extends "base.html" %}

{% block title %}Add Transaction - {{ user_id }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Transaction</h1>
    <div class="nav" style="margin-bottom: 0;">
        <a href="/dashboard/{{ user_id }}">Dashboard</a>
        <a href="/">Home</a>
    </div>
</div>

<form method="POST" action="/add_transaction/{{ user_id }}">
    <div class="grid-2">
        <div class="form-group">
            <label for="amount">Amount (Rs)</label>
            <input type="number" id="amount" name="amount" required min="0" step="0.01" placeholder="1000.00">
        </div>
        <div class="form-group">
            <label for="transaction_date">Date</label>
            <input type="date" id="transaction_date" name="transaction_date" required>
        </div>
    </div>
    <div class="grid-2">
        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" required placeholder="e.g. Uber ride, Zomato order">
        </div>
        <div class="form-group">
            <label for="category">Category (optional)</label>
            <select id="category" name="category">
                <option value="">— Select —</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="shopping">Shopping</option>
                <option value="bills">Bills</option>
                <option value="education">Education</option>
                <option value="housing">Housing</option>
                <option value="entertainment">Entertainment</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="merchant">Merchant (optional)</label>
            <input type="text" id="merchant" name="merchant" placeholder="e.g. Uber, Zomato, BigBasket">
        </div>
    </div>
    <div style="display: flex; gap: 12px; margin-top: 8px;">
        <button type="submit" class="btn">Add Transaction</button>
        <a href="/dashboard/{{ user_id }}" id="link-cancel" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}

{% block app_nav %}
<nav class="app-nav-top">
    <a href="/dashboard/{{ user_id }}"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="/add_transaction/{{ user_id }}" class="active"><span class="nav-icon">➕</span> Add Transaction</a>
    <a href="/insights/{{ user_id }}"><span class="nav-icon">💡</span> Insights</a>
    <a href="/"><span class="nav-icon">🏠</span> Home</a>
</nav>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var dateEl = document.getElementById('transaction_date');
    if (dateEl && !dateEl.value) {
        var d = new Date();
        dateEl.value = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    var cancelBtn = document.getElementById('link-cancel');
    if (cancelBtn && window.MiniApp && MiniApp.confirmPopup) {
        cancelBtn.addEventListener('click', function(e) {
            e.preventDefault();
            MiniApp.confirmPopup({
                title: 'Discard transaction?',
                message: 'Your form data will not be saved. Go back to dashboard?',
                confirmText: 'Yes, discard',
                cancelText: 'Stay',
                onConfirm: function() { window.location.href = cancelBtn.getAttribute('href'); }
            });
        });
    }
});
</script>
{% endblock %}
