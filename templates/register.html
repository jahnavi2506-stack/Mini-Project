{% extends "base.html" %}

{% block title %}Register - Finance ML{% endblock %}

{% block content %}
<h1>User Registration</h1>

<div class="nav">
    <a href="/">Home</a>
</div>

<form method="POST" action="/register" class="form-grid">
    <div class="grid-2">
        <div class="form-group">
            <label for="user_id">User ID</label>
            <input type="text" id="user_id" name="user_id" required placeholder="e.g. john_doe">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your.email@example.com" value="{{ prefill_email or request.form.get('email', '') }}">
            <p class="text-muted" style="font-size: 0.85rem; margin-top: 4px;">
                On successful registration, a confirmation message will be sent to this email (if email is configured).
            </p>
        </div>
    </div>
    <div class="grid-2">
        <div class="form-group">
            <label for="monthly_income">Monthly Income (Rs)</label>
            <input type="number" id="monthly_income" name="monthly_income" required min="0" step="0.01" placeholder="50000">
        </div>
        <div class="form-group">
            <label for="savings_goal">Savings goal (Rs, optional)</label>
            <input type="number" id="savings_goal" name="savings_goal" min="0" step="0.01" placeholder="10000">
        </div>
    </div>
    <div class="form-actions" style="display: flex; align-items: flex-end; gap: 12px;">
        <button type="submit" class="btn">Register</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
